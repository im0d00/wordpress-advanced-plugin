name: NexusBuilder CI

on: [push, pull_request]

jobs:
  php-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.1', extensions: 'mysqli' }
      - run: composer install --no-dev
      - run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1
      - run: vendor/bin/phpunit

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [php-tests, js-tests]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e

  release:
    if: github.ref == 'refs/heads/main'
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - run: npm run build
      - run: npm run zip  # Creates nexusbuilder.zip for WP plugin upload
      - uses: softprops/action-gh-release@v1
        with:
          files: nexusbuilder.zip
